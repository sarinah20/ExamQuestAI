<!DOCTYPE html>
<html>
<head>
    <title>Create Exam</title>
</head>
<body>

<h1>Create Exam</h1>

<form method="POST">

    <input
        type="text"
        name="exam_name"
        placeholder="Exam Name"
        required>

    <br><br>

    <input
        type="date"
        name="exam_date"
        required>

    <br><br>

    <button type="submit">
        Create Exam
    </button>

</form>

</body>
</html>
